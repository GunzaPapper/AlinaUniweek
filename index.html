<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#F7A8C6" />

    <!-- iOS / PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />
    <link rel="icon" href="./icons/icon-192.png" />

    <title>Alina’s UniWeek 💗</title>
    <link rel="stylesheet" href="./styles.css" />
</head>

<body>
    <header class="appHeader">
        <div class="titleBlock">
            <div class="appTitle">Alina’s UniWeek 💗</div>
            <div class="subtitle" id="subtitle"></div>
        </div>

        <div class="weekSwitch" aria-label="Week switch">
            <span class="pillLabel" id="weekPill">Неделя</span>
            <div class="segmented" role="tablist" aria-label="Week type">
                <button class="segBtn" id="weekOddBtn" type="button">Odd</button>
                <button class="segBtn" id="weekEvenBtn" type="button">Even</button>
            </div>
        </div>
    </header>

    <main class="container">
        <nav class="tabs" aria-label="Tabs">
            <button class="tabBtn active" id="tabSchedule" type="button">Расписание</button>
            <button class="tabBtn" id="tabWishes" type="button">Пожелания 💗</button>
            <button class="tabBtn" id="tabSettings" type="button">Настройки</button>
        </nav>

        <!-- SCHEDULE -->
        <section id="screenSchedule" class="screen active">
            <div class="card soft">
                <div class="cardTitleRow">
                    <div class="cardTitle">Расписание</div>
                    <div class="iconRow">
                        <button class="iconBtn" id="openCalendarBtn" type="button" aria-label="Открыть календарь">📅</button>
                        <button class="iconBtn" id="goSettingsBtn" type="button" aria-label="Настройки">⚙️</button>
                    </div>
                </div>
                <div class="smallMuted" id="selectedDateLabel"></div>
            </div>

            <div class="card">
                <div class="cardTitleRow">
                    <div class="cardTitle">Сегодня</div>
                    <div class="smallMuted" id="todayLabel"></div>
                </div>
                <div class="list" id="todayList"></div>
            </div>

            <div class="card">
                <div class="cardTitleRow">
                    <div class="cardTitle">Неделя (Пн–Сб)</div>
                </div>
                <div class="weekGrid" id="weekGrid"></div>
            </div>
        </section>

        <!-- WISHES -->
        <section id="screenWishes" class="screen">
            <!-- Wish card -->
            <div class="card">
                <div class="cardTitleRow">
                    <div class="cardTitle">Пожелание на сегодня 💗</div>
                    <button class="btn secondary" id="newWishBtn" type="button">Ещё</button>
                </div>
                <div class="wishBox" id="wishBox"></div>
            </div>

            <!-- Quiz card -->
            <div class="card">
                <div class="cardTitleRow">
                    <div class="cardTitle">Quiz 💗</div>
                    <button class="btn" id="startQuizBtn" type="button">Начать</button>
                </div>
                <div class="smallMuted">Мини-вопросы с уровнями сложности 💗</div>
            </div>

            <!-- Memory card (перенесено сюда) -->
            <div class="card">
                <div class="cardTitleRow">
                    <div class="cardTitle">Memory 💗</div>
                    <button class="btn secondary" id="openMemoryWishesBtn" type="button">Играть</button>
                </div>
                <div class="smallMuted">Найди все пары 💗</div>
            </div>
        </section>

        <!-- SETTINGS -->
        <section id="screenSettings" class="screen">
            <div class="card">
                <div class="cardTitleRow">
                    <div class="cardTitle">Управление расписанием</div>
                    <div class="smallMuted">Данные хранятся только на этом устройстве</div>
                </div>

                <div class="row" style="margin-top:12px;">
                    <button class="btn" id="addClassBtn" type="button">Добавить пару</button>
                </div>

                <div class="importRow" style="margin-top:12px;">
                    <label class="importBtn" id="importBtnLabel">
                        <span class="importIcon">📄</span>
                        <span class="importText">
                            <span class="importTitle">Импорт CSV</span>
                            <span class="importSub" id="importSub">Нажми и выбери файл</span>
                        </span>
                        <input id="csvInput" type="file" accept=".csv,text/csv" />
                    </label>
                </div>

                <div class="row" style="margin-top:12px;">
                    <button class="btn danger secondary" id="clearAllBtn" type="button">Очистить всё</button>
                    <div class="smallMuted">Сотрёт пары и историю игр</div>
                </div>
            </div>
        </section>
    </main>

    <!-- Add class modal -->
    <dialog class="modal" id="classDialog">
        <form method="dialog" class="modalBody" id="classForm">
            <div class="modalTitle">Добавить пару</div>

            <label class="field">
                <span>Название</span>
                <input class="input" name="courseName" required placeholder="Напр. Гражданское право" />
            </label>

            <div class="row">
                <label class="field grow">
                    <span>Тип</span>
                    <select class="input" name="classType" required>
                        <option value="lecture">Лекция</option>
                        <option value="seminar">Семинар</option>
                        <option value="lab">Лабораторная</option>
                    </select>
                </label>

                <label class="field grow">
                    <span>Неделя</span>
                    <select class="input" name="weekType" required>
                        <option value="both">Both</option>
                        <option value="odd">Odd</option>
                        <option value="even">Even</option>
                    </select>
                </label>
            </div>

            <div class="row">
                <label class="field grow">
                    <span>День</span>
                    <select class="input" name="dayOfWeek" required>
                        <option value="monday">Понедельник</option>
                        <option value="tuesday">Вторник</option>
                        <option value="wednesday">Среда</option>
                        <option value="thursday">Четверг</option>
                        <option value="friday">Пятница</option>
                        <option value="saturday">Суббота</option>
                    </select>
                </label>
            </div>

            <div class="row">
                <label class="field grow">
                    <span>Начало</span>
                    <input class="input" name="startTime" required placeholder="09:00" inputmode="numeric" />
                </label>

                <label class="field grow">
                    <span>Конец</span>
                    <input class="input" name="endTime" required placeholder="10:30" inputmode="numeric" />
                </label>
            </div>

            <div class="row">
                <label class="field grow">
                    <span>Аудитория</span>
                    <input class="input" name="location" required placeholder="Напр. a.304" />
                </label>
                <label class="field grow">
                    <span>Преподаватель</span>
                    <input class="input" name="teacher" required placeholder="Напр. Иванов" />
                </label>
            </div>

            <label class="field">
                <span>Цвет (необязательно)</span>
                <input class="input" name="colorHex" placeholder="#F7A8C6" />
            </label>

            <div class="row end">
                <button class="btn secondary" value="cancel" type="submit">Отмена</button>
                <button class="btn" id="saveClassBtn" value="default" type="submit">Сохранить</button>
            </div>
        </form>
    </dialog>

    <!-- Calendar bottom sheet -->
    <div class="sheetBackdrop" id="calBackdrop" hidden></div>
    <section class="sheet" id="calSheet" aria-label="Календарь" hidden>
        <div class="sheetGrab"></div>

        <div class="sheetHead">
            <button class="btn secondary sheetBtn" id="calCancelBtn" type="button">Отмена</button>
            <div class="sheetTitle" id="calTitle">Март 2026</div>
            <button class="btn sheetBtn" id="calDoneBtn" type="button">Готово</button>
        </div>

        <div class="calNav">
            <button class="iconBtn" id="calPrevBtn" type="button" aria-label="Предыдущий месяц">‹</button>
            <div class="smallMuted" id="calMonthLabel"></div>
            <button class="iconBtn" id="calNextBtn" type="button" aria-label="Следующий месяц">›</button>
        </div>

        <div class="calGrid" id="calGrid"></div>
    </section>

    <!-- Quiz modal -->
    <dialog class="modal" id="quizDialog">
        <div class="modalBody">
            <div class="cardTitleRow" style="margin-bottom:8px;">
                <div class="modalTitle" style="margin:0;">Quiz 💗</div>
                <button class="btn secondary" id="closeQuizBtn" type="button">Закрыть</button>
            </div>

            <div class="segmented" style="margin-bottom:12px;">
                <button class="segBtn" id="quizEasyBtn" type="button">easy</button>
                <button class="segBtn" id="quizMedBtn" type="button">medium</button>
                <button class="segBtn" id="quizHardBtn" type="button">hard</button>
            </div>

            <div class="quizQ" id="quizQuestion"></div>
            <div class="list" id="quizAnswers"></div>

            <div class="row end" style="margin-top:12px;">
                <button class="btn secondary" id="quizNextBtn" type="button">Следующий</button>
            </div>
        </div>
    </dialog>

    <!-- Memory modal -->
    <dialog class="modal" id="memoryDialog">
        <div class="modalBody">
            <div class="cardTitleRow" style="margin-bottom:8px;">
                <div class="modalTitle" style="margin:0;">Memory 💗</div>
                <button class="btn secondary" id="closeMemoryBtn" type="button">Закрыть</button>
            </div>

            <div class="smallMuted" id="memoryMeta" style="margin-bottom:10px;"></div>
            <div class="memoryGrid" id="memoryGrid"></div>

            <div class="row end" style="margin-top:12px;">
                <button class="btn secondary" id="restartMemoryBtn" type="button">Сначала</button>
            </div>
        </div>
    </dialog>

    <!-- Praise / effects overlay -->
    <div class="praiseOverlay" id="praiseOverlay" hidden>
        <canvas class="confetti" id="confettiCanvas"></canvas>
        <div class="praiseCard">
            <div class="praiseText" id="praiseText"></div>
            <div class="hearts" id="hearts"></div>
        </div>
    </div>

    <script src="./app.js">

    </script>
</body>
</html>
